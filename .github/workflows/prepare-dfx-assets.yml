name: Check dfx asset preparation
# This workflow is a stub. The original implementation attempted to pre-warm Cargo caches
# for other workflows, but the cache keys never matched, so sharing never worked.
# The workflow is kept as a no-op because "prepare-dfx-assets:required" is enforced
# as a branch protection rule and cannot be removed without updating repository settings.

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aggregate:
    name: prepare-dfx-assets:required
    runs-on: ubuntu-latest
    steps:
      - run: echo "ok"
